{% extends 'base.html' %}
{% block title %}Вход{% endblock %}
{% block page_title %}Авторизация{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card card border-0 shadow-sm">
    <div class="card-body p-4 p-md-5">
      <div class="mb-4">
        <div class="auth-badge">SSS Registry</div>
        <h2 class="auth-title mt-3">Вход в систему</h2>
        <p class="auth-text mb-0">Используйте логин и пароль суперпользователя Django.</p>
      </div>

      <form method="post" class="form-modern">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-primary w-100 btn-lg" type="submit">Войти</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
